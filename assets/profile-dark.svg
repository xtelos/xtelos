<text class="c" x="22" y="1606" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.22s"><tspan fill="#e6edf3">latest public push </tspan><tspan fill="#2a2b3a">···</tspan><tspan> </tspan><tspan fill="#8b8fa3">2026-07-23</tspan><tspan>  </tspan><tspan fill="#79c0ff">xtelos/xtelos</tspan></text>
