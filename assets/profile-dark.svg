<text class="c" x="22" y="1687" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.45s"><tspan fill="#79c0ff">languages   </tspan><tspan fill="#e6edf3">JavaScript · TypeScript · Python · PHP · SQL</tspan></text>
<text class="c" x="22" y="1714" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.45s"><tspan fill="#79c0ff">frontend    </tspan><tspan fill="#e6edf3">React · Next.js · single-page apps that stay fast</tspan></text>
<text class="c" x="22" y="1741" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.46s"><tspan fill="#79c0ff">backend     </tspan><tspan fill="#e6edf3">Node.js · Flask · Express · REST and JSON-RPC APIs</tspan></text>
