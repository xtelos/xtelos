<text class="title" x="415.0" y="23.1" text-anchor="middle">dylan@xtelos: ~ · zsh</text>
<text x="22" y="67" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:0.20s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:0.20s">~ </tspan><tspan class="c" style="animation-delay:0.34s">w</tspan><tspan class="c" style="animation-delay:0.36s">h</tspan><tspan class="c" style="animation-delay:0.39s">o</tspan><tspan class="c" style="animation-delay:0.41s">a</tspan><tspan class="c" style="animation-delay:0.44s">m</tspan><tspan class="c" style="animation-delay:0.46s">i</tspan></text>
<text class="c" x="22" y="94" xml:space="preserve" fill="#8b8fa3" style="animation-delay:0.64s"><tspan fill="#e6edf3">Dylan Fodor</tspan><tspan> · </tspan><tspan fill="#e6edf3">Full-Stack Developer</tspan><tspan> · </tspan><tspan fill="#8b8fa3">Software Consulting Services</tspan></text>
<text x="22" y="148" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:0.84s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:0.84s">~ </tspan><tspan class="c" style="animation-delay:0.95s">c</tspan><tspan class="c" style="animation-delay:0.97s">a</tspan><tspan class="c" style="animation-delay:0.99s">t</tspan><tspan class="c" style="animation-delay:1.01s"> </tspan><tspan class="c" style="animation-delay:1.03s">a</tspan><tspan class="c" style="animation-delay:1.04s">b</tspan><tspan class="c" style="animation-delay:1.06s">o</tspan><tspan class="c" style="animation-delay:1.08s">u</tspan><tspan class="c" style="animation-delay:1.10s">t</tspan><tspan class="c" style="animation-delay:1.12s">.</tspan><tspan class="c" style="animation-delay:1.14s">t</tspan><tspan class="c" style="animation-delay:1.16s">x</tspan><tspan class="c" style="animation-delay:1.18s">t</tspan></text>
<text class="c" x="22" y="175" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.32s"><tspan fill="#e6edf3">I build and modernize the software newspapers use to sell and produce advertising.</tspan></text>
<text class="c" x="22" y="202" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.33s"><tspan fill="#e6edf3">I lean front-end but work the whole stack, and the work I&#x27;m proudest of is the</tspan></text>
<text class="c" x="22" y="229" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.35s"><tspan fill="#e6edf3">load-bearing kind: two-factor auth, payment processing, and a generative-AI tool</tspan></text>
<text class="c" x="22" y="256" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.36s"><tspan fill="#e6edf3">that makes print-ready ad artwork. Reliability first, because that&#x27;s the part</tspan></text>
<text class="c" x="22" y="283" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.38s"><tspan fill="#e6edf3">people only notice when it&#x27;s missing.</tspan></text>
<text class="c" x="22" y="337" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.39s"><tspan fill="#8b8fa3">Commitment issues? Not me. I commit early, commit often, and only occasionally</tspan></text>
<text class="c" x="22" y="364" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.40s"><tspan fill="#8b8fa3">force-push something I&#x27;ll regret.</tspan></text>
<text x="22" y="418" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:1.56s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:1.56s">~ </tspan><tspan class="c" style="animation-delay:1.64s">l</tspan><tspan class="c" style="animation-delay:1.66s">s</tspan><tspan class="c" style="animation-delay:1.67s"> </tspan><tspan class="c" style="animation-delay:1.69s">~</tspan><tspan class="c" style="animation-delay:1.70s">/</tspan><tspan class="c" style="animation-delay:1.72s">t</tspan><tspan class="c" style="animation-delay:1.73s">o</tspan><tspan class="c" style="animation-delay:1.75s">o</tspan><tspan class="c" style="animation-delay:1.76s">l</tspan><tspan class="c" style="animation-delay:1.77s">s</tspan></text>
<text class="c" x="22" y="445" xml:space="preserve" fill="#8b8fa3" style="animation-delay:1.89s"><tspan fill="#79c0ff">argus/</tspan><tspan>  </tspan><tspan fill="#79c0ff">aegis/</tspan><tspan>  </tspan><tspan fill="#79c0ff">iris/</tspan><tspan>  </tspan><tspan fill="#79c0ff">demeter/</tspan><tspan>  </tspan><tspan fill="#79c0ff">ariadne/</tspan><tspan>  </tspan><tspan fill="#79c0ff">delphi/</tspan><tspan>  </tspan><tspan fill="#79c0ff">momus/</tspan></text>
<text x="22" y="499" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:2.01s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:2.01s">~ </tspan><tspan class="c" style="animation-delay:2.07s">c</tspan><tspan class="c" style="animation-delay:2.08s">a</tspan><tspan class="c" style="animation-delay:2.10s">t</tspan><tspan class="c" style="animation-delay:2.11s"> </tspan><tspan class="c" style="animation-delay:2.12s">~</tspan><tspan class="c" style="animation-delay:2.13s">/</tspan><tspan class="c" style="animation-delay:2.14s">t</tspan><tspan class="c" style="animation-delay:2.15s">o</tspan><tspan class="c" style="animation-delay:2.16s">o</tspan><tspan class="c" style="animation-delay:2.18s">l</tspan><tspan class="c" style="animation-delay:2.19s">s</tspan><tspan class="c" style="animation-delay:2.20s">/</tspan><tspan class="c" style="animation-delay:2.21s">R</tspan><tspan class="c" style="animation-delay:2.22s">E</tspan><tspan class="c" style="animation-delay:2.23s">A</tspan><tspan class="c" style="animation-delay:2.24s">D</tspan><tspan class="c" style="animation-delay:2.26s">M</tspan><tspan class="c" style="animation-delay:2.27s">E</tspan></text>
<text class="c" x="22" y="526" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.35s"><tspan fill="#8b8fa3">I run AI coding agents against real production code, and I got tired of &quot;trust me,</tspan></text>
<text class="c" x="22" y="553" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.36s"><tspan fill="#8b8fa3">it works.&quot; Each of these turns a category of guesswork into a measured verdict.</tspan></text>
<text class="c" x="22" y="607" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.37s"><tspan fill="#79c0ff">argus       </tspan><tspan fill="#e6edf3">call/impact graph for a million-line legacy codebase, with cited</tspan></text>
<text class="c" x="22" y="634" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.38s"><tspan fill="#e6edf3">            file:line receipts instead of a grep sweep</tspan></text>
<text class="c" x="22" y="661" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.39s"><tspan fill="#79c0ff">aegis       </tspan><tspan fill="#e6edf3">build-trust engine that compiles on the real host; unparsed and</tspan></text>
<text class="c" x="22" y="688" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.40s"><tspan fill="#e6edf3">            unverified are never a pass, so it cannot report a false green</tspan></text>
<text class="c" x="22" y="715" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.41s"><tspan fill="#79c0ff">iris        </tspan><tspan fill="#e6edf3">headless visual verification over the Chrome DevTools Protocol:</tspan></text>
<text class="c" x="22" y="742" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.41s"><tspan fill="#e6edf3">            screenshots with a verdict, console errors caught at the protocol</tspan></text>
<text class="c" x="22" y="769" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.42s"><tspan fill="#e6edf3">            level</tspan></text>
<text class="c" x="22" y="796" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.43s"><tspan fill="#79c0ff">demeter     </tspan><tspan fill="#e6edf3">dev-database harness that stands up, seeds, and tears down per stack,</tspan></text>
<text class="c" x="22" y="823" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.44s"><tspan fill="#e6edf3">            and never wipes the thing you cannot rebuild</tspan></text>
<text class="c" x="22" y="850" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.45s"><tspan fill="#79c0ff">ariadne     </tspan><tspan fill="#e6edf3">long-effort tracker reporting the drift between what the tracker</tspan></text>
<text class="c" x="22" y="877" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.46s"><tspan fill="#e6edf3">            claims and what git says actually happened</tspan></text>
<text class="c" x="22" y="904" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.47s"><tspan fill="#79c0ff">delphi      </tspan><tspan fill="#e6edf3">personal knowledge engine: a linked note graph with scored recall, so</tspan></text>
<text class="c" x="22" y="931" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.47s"><tspan fill="#e6edf3">            hard-won context survives from one session to the next</tspan></text>
<text class="c" x="22" y="958" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.48s"><tspan fill="#79c0ff">momus       </tspan><tspan fill="#e6edf3">adversarial reviewer that assumes my change is broken and tries to</tspan></text>
<text class="c" x="22" y="985" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.49s"><tspan fill="#e6edf3">            prove it before anything gets called done</tspan></text>
<text class="c" x="22" y="1039" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.50s"><tspan fill="#8b8fa3">Source private while they grow up; ask me about any of them.</tspan></text>
<text x="22" y="1093" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:2.59s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:2.59s">~ </tspan><tspan class="c" style="animation-delay:2.65s">t</tspan><tspan class="c" style="animation-delay:2.65s">a</tspan><tspan class="c" style="animation-delay:2.66s">i</tspan><tspan class="c" style="animation-delay:2.67s">l</tspan><tspan class="c" style="animation-delay:2.68s"> </tspan><tspan class="c" style="animation-delay:2.69s">s</tspan><tspan class="c" style="animation-delay:2.70s">h</tspan><tspan class="c" style="animation-delay:2.71s">i</tspan><tspan class="c" style="animation-delay:2.72s">p</tspan><tspan class="c" style="animation-delay:2.73s">p</tspan><tspan class="c" style="animation-delay:2.73s">e</tspan><tspan class="c" style="animation-delay:2.74s">d</tspan><tspan class="c" style="animation-delay:2.75s">.</tspan><tspan class="c" style="animation-delay:2.76s">l</tspan><tspan class="c" style="animation-delay:2.77s">o</tspan><tspan class="c" style="animation-delay:2.78s">g</tspan></text>
<text class="c" x="22" y="1120" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.85s"><tspan fill="#ffa657">[auth]      </tspan><tspan fill="#e6edf3">Multi-method 2FA end to end: authenticator-app TOTP, SMS, email, and</tspan></text>
<text class="c" x="22" y="1147" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.85s"><tspan fill="#e6edf3">            30-day trusted devices. Live across 90+ newspaper sites.</tspan></text>
<text class="c" x="22" y="1174" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.86s"><tspan fill="#ffa657">[payments]  </tspan><tspan fill="#e6edf3">Provider-agnostic payment layer (Stripe, Square). Led a processor</tspan></text>
<text class="c" x="22" y="1201" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.87s"><tspan fill="#e6edf3">            migration with per-customer routing and a safe, re-runnable job moving</tspan></text>
<text class="c" x="22" y="1228" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.87s"><tspan fill="#e6edf3">            stored cards into a token vault.</tspan></text>
<text class="c" x="22" y="1255" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.88s"><tspan fill="#ffa657">[genai]     </tspan><tspan fill="#e6edf3">Print-ready ad artwork from a text prompt: three interchangeable image</tspan></text>
<text class="c" x="22" y="1282" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.89s"><tspan fill="#e6edf3">            models behind one interface, OCR text handling, and an automated check</tspan></text>
<text class="c" x="22" y="1309" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.89s"><tspan fill="#e6edf3">            that rejects unusable output before it ships.</tspan></text>
<text class="c" x="22" y="1336" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.90s"><tspan fill="#ffa657">[adtech]    </tspan><tspan fill="#e6edf3">Google Ad Manager integration: line items, advertisers, and creatives</tspan></text>
<text class="c" x="22" y="1363" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.91s"><tspan fill="#e6edf3">            created straight from order entry.</tspan></text>
<text class="c" x="22" y="1390" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.91s"><tspan fill="#ffa657">[solo]      </tspan><tspan fill="#e6edf3">Multi-tenant classified-ads marketplace, sole developer: ad builder,</tspan></text>
<text class="c" x="22" y="1417" xml:space="preserve" fill="#8b8fa3" style="animation-delay:2.92s"><tspan fill="#e6edf3">            checkout funnel, payments, approvals, email.</tspan></text>
<text x="22" y="1471" xml:space="preserve" fill="#e6edf3"><tspan class="c" fill="#7ee787" style="animation-delay:2.99s">➜ </tspan><tspan class="c" fill="#79c0ff" style="animation-delay:2.99s">~ </tspan><tspan class="c" style="animation-delay:3.03s">t</tspan><tspan class="c" style="animation-delay:3.04s">a</tspan><tspan class="c" style="animation-delay:3.05s">i</tspan><tspan class="c" style="animation-delay:3.05s">l</tspan><tspan class="c" style="animation-delay:3.06s"> </tspan><tspan class="c" style="animation-delay:3.07s">a</tspan><tspan class="c" style="animation-delay:3.08s">c</tspan><tspan class="c" style="animation-delay:3.08s">t</tspan><tspan class="c" style="animation-delay:3.09s">i</tspan><tspan class="c" style="animation-delay:3.10s">v</tspan><tspan class="c" style="animation-delay:3.10s">i</tspan><tspan class="c" style="animation-delay:3.11s">t</tspan><tspan class="c" style="animation-delay:3.12s">y</tspan><tspan class="c" style="animation-delay:3.12s">.</tspan><tspan class="c" style="animation-delay:3.13s">l</tspan><tspan class="c" style="animation-delay:3.14s">o</tspan><tspan class="c" style="animation-delay:3.14s">g</tspan></text>
<text class="c" x="22" y="1498" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.20s"><tspan fill="#e6edf3">merged, last 7d </tspan><tspan fill="#2a2b3a">······</tspan><tspan> </tspan><tspan fill="#e6edf3">64 pull requests</tspan></text>
<text class="c" x="22" y="1525" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.20s"><tspan fill="#e6edf3">merged, last 30d </tspan><tspan fill="#2a2b3a">·····</tspan><tspan> </tspan><tspan fill="#e6edf3">183 across 15 repositories</tspan></text>
<text class="c" x="22" y="1552" xml:space="preserve" fill="#8b8fa3" style="animation-delay:3.21s"><tspan fill="#e6edf3">30-day trend </tspan><tspan fill="#2a2b3a">·········</tspan><tspan> </tspan><tspan fill="#39d353">▂▃▂</tspan><tspan fill="#2a2b3a">▁▁</tspan><tspan fill="#39d353">▂▃▂▂</tspan><tspan fill="#2a2b3a">▁▁▁▁</tspan><tspan fill="#39d353">▄▄▃▄</tspan><tspan fill="#2a2b3a">▁</tspan><tspan fill="#39d353">▂▄█▄▄▇▄</tspan><tspan fill="#2a2b3a">▁▁</tspan><tspan fill="#39d353">▃▇▃</tspan></text>
