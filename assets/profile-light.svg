<text x="22" y="1633" xml:space="preserve" fill="#1f2328"><tspan class="c" fill="#1a7f37" style="animation-delay:3.27s">➜ </tspan><tspan class="c" fill="#0969da" style="animation-delay:3.27s">~ </tspan><tspan class="c" style="animation-delay:3.31s">c</tspan><tspan class="c" style="animation-delay:3.32s">a</tspan><tspan class="c" style="animation-delay:3.32s">t</tspan><tspan class="c" style="animation-delay:3.33s"> </tspan><tspan class="c" style="animation-delay:3.34s">s</tspan><tspan class="c" style="animation-delay:3.34s">t</tspan><tspan class="c" style="animation-delay:3.35s">a</tspan><tspan class="c" style="animation-delay:3.36s">c</tspan><tspan class="c" style="animation-delay:3.36s">k</tspan><tspan class="c" style="animation-delay:3.37s">.</tspan><tspan class="c" style="animation-delay:3.38s">t</tspan><tspan class="c" style="animation-delay:3.38s">x</tspan><tspan class="c" style="animation-delay:3.39s">t</tspan></text>
<text class="c" x="22" y="1660" xml:space="preserve" fill="#6e7781" style="animation-delay:3.44s"><tspan fill="#0969da">languages   </tspan><tspan fill="#1f2328">JavaScript · TypeScript · Python · PHP · SQL</tspan></text>
<text class="c" x="22" y="1687" xml:space="preserve" fill="#6e7781" style="animation-delay:3.45s"><tspan fill="#0969da">frontend    </tspan><tspan fill="#1f2328">React · Next.js · single-page apps that stay fast</tspan></text>
<text class="c" x="22" y="1714" xml:space="preserve" fill="#6e7781" style="animation-delay:3.45s"><tspan fill="#0969da">backend     </tspan><tspan fill="#1f2328">Node.js · Flask · Express · REST and JSON-RPC APIs</tspan></text>
<text class="c" x="22" y="1741" xml:space="preserve" fill="#6e7781" style="animation-delay:3.46s"><tspan fill="#0969da">data        </tspan><tspan fill="#1f2328">PostgreSQL · MySQL · MongoDB · Redis</tspan></text>
<text class="c" x="22" y="1768" xml:space="preserve" fill="#6e7781" style="animation-delay:3.46s"><tspan fill="#0969da">infra       </tspan><tspan fill="#1f2328">AWS · Docker · CI/CD · Linux</tspan></text>
<text class="c" x="22" y="1795" xml:space="preserve" fill="#6e7781" style="animation-delay:3.47s"><tspan fill="#0969da">ai          </tspan><tspan fill="#1f2328">LLM integration · image generation · speech to text</tspan></text>
