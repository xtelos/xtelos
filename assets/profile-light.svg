<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1633" width="1200" height="1633" role="img">
<style>
text { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 15px; }
.title { font-size: 13.1px; fill: #57606a; }

.cursor { animation: blink 1.1s steps(1, end) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
@media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

</style>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#fbfcfd"/>
<stop offset="1" stop-color="#ffffff"/>
</linearGradient>
<clipPath id="win"><rect x="1" y="1" width="1198" height="1631" rx="11"/></clipPath>
</defs>
<rect x="0.5" y="0.5" width="1199" height="1632" rx="11.5" fill="url(#bg)" stroke="#d0d7de"/>
<g clip-path="url(#win)">
<rect x="1" y="1" width="1198" height="35" fill="#f6f8fa"/>
<line x1="1" y1="36" x2="1199" y2="36" stroke="#d0d7de" stroke-width="1"/>
</g>
<circle cx="24" cy="18.0" r="6" fill="#ff5f57"/><circle cx="44" cy="18.0" r="6" fill="#febc2e"/><circle cx="64" cy="18.0" r="6" fill="#28c840"/>
<text class="title" x="600.0" y="23.1" text-anchor="middle">dylan@xtelos: ~ · zsh</text>
<text x="24" y="67" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>whoami</tspan></text>
<text x="24" y="94" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">Dylan Fodor</tspan><tspan> · </tspan><tspan fill="#1f2328">Full-Stack Developer</tspan><tspan> · </tspan><tspan fill="#6e7781">Software Consulting Services</tspan></text>
<text x="24" y="148" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat about.txt</tspan></text>
<text x="24" y="175" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">I build and modernize the software newspapers use to sell and produce advertising. I lean front-end but work the whole</tspan></text>
<text x="24" y="202" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">stack, and the work I&#x27;m proudest of is the load-bearing kind: two-factor auth, payment processing, and a generative-AI</tspan></text>
<text x="24" y="229" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">tool that makes print-ready ad artwork. Reliability first, because that&#x27;s the part people only notice when it&#x27;s missing.</tspan></text>
<text x="24" y="283" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">Commitment issues? Not me. I commit early, commit often, and only occasionally force-push something I&#x27;ll regret.</tspan></text>
<text x="24" y="337" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>ls ~/tools</tspan></text>
<text x="24" y="364" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">argus/</tspan><tspan>  </tspan><tspan fill="#0969da">aegis/</tspan><tspan>  </tspan><tspan fill="#0969da">iris/</tspan><tspan>  </tspan><tspan fill="#0969da">demeter/</tspan><tspan>  </tspan><tspan fill="#0969da">ariadne/</tspan><tspan>  </tspan><tspan fill="#0969da">delphi/</tspan><tspan>  </tspan><tspan fill="#0969da">momus/</tspan></text>
<text x="24" y="418" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat ~/tools/README</tspan></text>
<text x="24" y="445" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">I run AI coding agents against real production code, and I got tired of &quot;trust me, it works.&quot; Each of these turns a</tspan></text>
<text x="24" y="472" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">category of guesswork into a measured verdict.</tspan></text>
<text x="24" y="526" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">argus       </tspan><tspan fill="#1f2328">call/impact graph for a million-line legacy codebase, with cited file:line receipts instead of a grep sweep</tspan></text>
<text x="24" y="553" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">aegis       </tspan><tspan fill="#1f2328">build-trust engine that compiles on the real host; unparsed and unverified are never a pass, so it cannot</tspan></text>
<text x="24" y="580" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            report a false green</tspan></text>
<text x="24" y="607" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">iris        </tspan><tspan fill="#1f2328">headless visual verification over the Chrome DevTools Protocol: screenshots with a verdict, console errors</tspan></text>
<text x="24" y="634" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            caught at the protocol level</tspan></text>
<text x="24" y="661" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">demeter     </tspan><tspan fill="#1f2328">dev-database harness that stands up, seeds, and tears down per stack, and never wipes the thing you cannot</tspan></text>
<text x="24" y="688" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            rebuild</tspan></text>
<text x="24" y="715" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">ariadne     </tspan><tspan fill="#1f2328">long-effort tracker reporting the drift between what the tracker claims and what git says actually happened</tspan></text>
<text x="24" y="742" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">delphi      </tspan><tspan fill="#1f2328">personal knowledge engine: a linked note graph with scored recall, so hard-won context survives from one</tspan></text>
<text x="24" y="769" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            session to the next</tspan></text>
<text x="24" y="796" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">momus       </tspan><tspan fill="#1f2328">adversarial reviewer that assumes my change is broken and tries to prove it before anything gets called done</tspan></text>
<text x="24" y="850" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">Source private while they grow up; ask me about any of them.</tspan></text>
<text x="24" y="904" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>tail shipped.log</tspan></text>
<text x="24" y="931" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[auth]      </tspan><tspan fill="#1f2328">Multi-method 2FA end to end: authenticator-app TOTP, SMS, email, and 30-day trusted devices. Live across 90+</tspan></text>
<text x="24" y="958" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            newspaper sites.</tspan></text>
<text x="24" y="985" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[payments]  </tspan><tspan fill="#1f2328">Provider-agnostic payment layer (Stripe, Square). Led a processor migration with per-customer routing and a</tspan></text>
<text x="24" y="1012" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            safe, re-runnable job moving stored cards into a token vault.</tspan></text>
<text x="24" y="1039" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[genai]     </tspan><tspan fill="#1f2328">Print-ready ad artwork from a text prompt: three interchangeable image models behind one interface, OCR text</tspan></text>
<text x="24" y="1066" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            handling, and an automated check that rejects unusable output before it ships.</tspan></text>
<text x="24" y="1093" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[adtech]    </tspan><tspan fill="#1f2328">Google Ad Manager integration: line items, advertisers, and creatives created straight from order entry.</tspan></text>
<text x="24" y="1120" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[solo]      </tspan><tspan fill="#1f2328">Multi-tenant classified-ads marketplace, sole developer: ad builder, checkout funnel, payments, approvals,</tspan></text>
<text x="24" y="1147" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">            email.</tspan></text>
<text x="24" y="1201" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>tail activity.log</tspan></text>
<text x="24" y="1228" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">merged, last 7d </tspan><tspan fill="#d8dee4">······</tspan><tspan> </tspan><tspan fill="#1f2328">65 pull requests</tspan></text>
<text x="24" y="1255" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">merged, last 30d </tspan><tspan fill="#d8dee4">·····</tspan><tspan> </tspan><tspan fill="#1f2328">184 across 15 repositories</tspan></text>
<text x="24" y="1282" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">30-day trend </tspan><tspan fill="#d8dee4">·········</tspan><tspan> </tspan><tspan fill="#1a7f37">▂▃▂</tspan><tspan fill="#d8dee4">▁▁</tspan><tspan fill="#1a7f37">▂▃▂▂</tspan><tspan fill="#d8dee4">▁▁▁▁</tspan><tspan fill="#1a7f37">▄▄▃▄</tspan><tspan fill="#d8dee4">▁</tspan><tspan fill="#1a7f37">▂▄█▄▄▇▄</tspan><tspan fill="#d8dee4">▁▁</tspan><tspan fill="#1a7f37">▃▇▃</tspan></text>
<text x="24" y="1309" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">active days </tspan><tspan fill="#d8dee4">··········</tspan><tspan> </tspan><tspan fill="#1f2328">21 of the last 30</tspan></text>
<text x="24" y="1336" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">latest public push </tspan><tspan fill="#d8dee4">···</tspan><tspan> </tspan><tspan fill="#6e7781">2026-07-23</tspan><tspan>  </tspan><tspan fill="#0969da">xtelos/xtelos</tspan></text>
<text x="24" y="1390" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat stack.txt</tspan></text>
<text x="24" y="1417" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">languages   </tspan><tspan fill="#1f2328">JavaScript · TypeScript · Python · PHP · SQL</tspan></text>
<text x="24" y="1444" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">frontend    </tspan><tspan fill="#1f2328">React · Next.js · single-page apps that stay fast</tspan></text>
<text x="24" y="1471" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">backend     </tspan><tspan fill="#1f2328">Node.js · Flask · Express · REST and JSON-RPC APIs</tspan></text>
<text x="24" y="1498" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">data        </tspan><tspan fill="#1f2328">PostgreSQL · MySQL · MongoDB · Redis</tspan></text>
<text x="24" y="1525" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">infra       </tspan><tspan fill="#1f2328">AWS · Docker · CI/CD · Linux</tspan></text>
<text x="24" y="1552" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">ai          </tspan><tspan fill="#1f2328">LLM integration · image generation · speech to text</tspan></text>
<text x="24" y="1606" xml:space="preserve"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan class="cursor" fill="#1f2328">▋</tspan></text>
</svg>
