<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 3205" width="460" height="3205" role="img">
<style>
text { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 15px; }
.title { font-size: 13.1px; fill: #57606a; }

.cursor { animation: blink 1.1s steps(1, end) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
@media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

</style>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#fbfcfd"/>
<stop offset="1" stop-color="#ffffff"/>
</linearGradient>
<clipPath id="win"><rect x="1" y="1" width="458" height="3203" rx="11"/></clipPath>
</defs>
<rect x="0.5" y="0.5" width="459" height="3204" rx="11.5" fill="url(#bg)" stroke="#d0d7de"/>
<g clip-path="url(#win)">
<rect x="1" y="1" width="458" height="29" fill="#f6f8fa"/>
<line x1="1" y1="30" x2="459" y2="30" stroke="#d0d7de" stroke-width="1"/>
</g>
<circle cx="17" cy="15.0" r="5" fill="#ff5f57"/><circle cx="33" cy="15.0" r="5" fill="#febc2e"/><circle cx="49" cy="15.0" r="5" fill="#28c840"/>
<text class="title" x="230.0" y="20.1" text-anchor="middle">dylan@xtelos · zsh</text>
<text x="16" y="61" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>whoami</tspan></text>
<text x="16" y="85" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">Dylan Fodor</tspan><tspan> · </tspan><tspan fill="#1f2328">Full-Stack Developer</tspan></text>
<text x="16" y="109" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">Software Consulting Services</tspan></text>
<text x="16" y="157" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat about.txt</tspan></text>
<text x="16" y="181" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">I build and modernize the software newspapers</tspan></text>
<text x="16" y="205" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">use to sell and produce advertising. I lean</tspan></text>
<text x="16" y="229" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">front-end but work the whole stack, and the</tspan></text>
<text x="16" y="253" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">work I&#x27;m proudest of is the load-bearing</tspan></text>
<text x="16" y="277" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">kind: two-factor auth, payment processing,</tspan></text>
<text x="16" y="301" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">and a generative-AI tool that makes print-</tspan></text>
<text x="16" y="325" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">ready ad artwork. Reliability first, because</tspan></text>
<text x="16" y="349" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">that&#x27;s the part people only notice when it&#x27;s</tspan></text>
<text x="16" y="373" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">missing.</tspan></text>
<text x="16" y="421" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">Commitment issues? Not me. I commit early,</tspan></text>
<text x="16" y="445" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">commit often, and only occasionally force-</tspan></text>
<text x="16" y="469" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">push something I&#x27;ll regret.</tspan></text>
<text x="16" y="517" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>ls ~/tools</tspan></text>
<text x="16" y="541" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">argus/</tspan><tspan>  </tspan><tspan fill="#0969da">aegis/</tspan><tspan>  </tspan><tspan fill="#0969da">iris/</tspan><tspan>  </tspan><tspan fill="#0969da">demeter/</tspan><tspan>  </tspan><tspan fill="#0969da">ariadne/</tspan></text>
<text x="16" y="565" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">delphi/</tspan><tspan>  </tspan><tspan fill="#0969da">momus/</tspan></text>
<text x="16" y="613" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat ~/tools/README</tspan></text>
<text x="16" y="637" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">I run AI coding agents against real</tspan></text>
<text x="16" y="661" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">production code, and I got tired of &quot;trust</tspan></text>
<text x="16" y="685" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">me, it works.&quot; Each of these turns a category</tspan></text>
<text x="16" y="709" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">of guesswork into a measured verdict.</tspan></text>
<text x="16" y="757" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">argus</tspan></text>
<text x="16" y="781" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  call/impact graph for a million-line legacy</tspan></text>
<text x="16" y="805" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  codebase, with cited file:line receipts</tspan></text>
<text x="16" y="829" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  instead of a grep sweep</tspan></text>
<text x="16" y="877" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">aegis</tspan></text>
<text x="16" y="901" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  build-trust engine that compiles on the</tspan></text>
<text x="16" y="925" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  real host; unparsed and unverified are</tspan></text>
<text x="16" y="949" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  never a pass, so it cannot report a false</tspan></text>
<text x="16" y="973" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  green</tspan></text>
<text x="16" y="1021" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">iris</tspan></text>
<text x="16" y="1045" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  headless visual verification over the</tspan></text>
<text x="16" y="1069" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Chrome DevTools Protocol: screenshots with</tspan></text>
<text x="16" y="1093" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  a verdict, console errors caught at the</tspan></text>
<text x="16" y="1117" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  protocol level</tspan></text>
<text x="16" y="1165" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">demeter</tspan></text>
<text x="16" y="1189" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  dev-database harness that stands up, seeds,</tspan></text>
<text x="16" y="1213" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  and tears down per stack, and never wipes</tspan></text>
<text x="16" y="1237" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  the thing you cannot rebuild</tspan></text>
<text x="16" y="1285" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">ariadne</tspan></text>
<text x="16" y="1309" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  long-effort tracker reporting the drift</tspan></text>
<text x="16" y="1333" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  between what the tracker claims and what</tspan></text>
<text x="16" y="1357" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  git says actually happened</tspan></text>
<text x="16" y="1405" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">delphi</tspan></text>
<text x="16" y="1429" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  personal knowledge engine: a linked note</tspan></text>
<text x="16" y="1453" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  graph with scored recall, so hard-won</tspan></text>
<text x="16" y="1477" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  context survives from one session to the</tspan></text>
<text x="16" y="1501" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  next</tspan></text>
<text x="16" y="1549" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">momus</tspan></text>
<text x="16" y="1573" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  adversarial reviewer that assumes my change</tspan></text>
<text x="16" y="1597" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  is broken and tries to prove it before</tspan></text>
<text x="16" y="1621" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  anything gets called done</tspan></text>
<text x="16" y="1669" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">Source private while they grow up; ask me</tspan></text>
<text x="16" y="1693" xml:space="preserve" fill="#6e7781"><tspan fill="#6e7781">about any of them.</tspan></text>
<text x="16" y="1741" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>tail shipped.log</tspan></text>
<text x="16" y="1765" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[auth]</tspan></text>
<text x="16" y="1789" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Multi-method 2FA end to end: authenticator-</tspan></text>
<text x="16" y="1813" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  app TOTP, SMS, email, and 30-day trusted</tspan></text>
<text x="16" y="1837" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  devices. Live across 90+ newspaper sites.</tspan></text>
<text x="16" y="1885" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[payments]</tspan></text>
<text x="16" y="1909" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Provider-agnostic payment layer (Stripe,</tspan></text>
<text x="16" y="1933" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Square). Led a processor migration with</tspan></text>
<text x="16" y="1957" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  per-customer routing and a safe, re-</tspan></text>
<text x="16" y="1981" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  runnable job moving stored cards into a</tspan></text>
<text x="16" y="2005" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  token vault.</tspan></text>
<text x="16" y="2053" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[genai]</tspan></text>
<text x="16" y="2077" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Print-ready ad artwork from a text prompt:</tspan></text>
<text x="16" y="2101" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  three interchangeable image models behind</tspan></text>
<text x="16" y="2125" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  one interface, OCR text handling, and an</tspan></text>
<text x="16" y="2149" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  automated check that rejects unusable</tspan></text>
<text x="16" y="2173" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  output before it ships.</tspan></text>
<text x="16" y="2221" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[adtech]</tspan></text>
<text x="16" y="2245" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Google Ad Manager integration: line items,</tspan></text>
<text x="16" y="2269" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  advertisers, and creatives created straight</tspan></text>
<text x="16" y="2293" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  from order entry.</tspan></text>
<text x="16" y="2341" xml:space="preserve" fill="#6e7781"><tspan fill="#953800">[solo]</tspan></text>
<text x="16" y="2365" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Multi-tenant classified-ads marketplace,</tspan></text>
<text x="16" y="2389" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  sole developer: ad builder, checkout</tspan></text>
<text x="16" y="2413" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  funnel, payments, approvals, email.</tspan></text>
<text x="16" y="2461" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>tail activity.log</tspan></text>
<text x="16" y="2485" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">merged, last 7d</tspan></text>
<text x="16" y="2509" xml:space="preserve" fill="#6e7781"><tspan>  </tspan><tspan fill="#1f2328">65 pull requests</tspan></text>
<text x="16" y="2533" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">merged, last 30d</tspan></text>
<text x="16" y="2557" xml:space="preserve" fill="#6e7781"><tspan>  </tspan><tspan fill="#1f2328">184 across 15 repositories</tspan></text>
<text x="16" y="2581" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">30-day trend</tspan></text>
<text x="16" y="2605" xml:space="preserve" fill="#6e7781"><tspan>  </tspan><tspan fill="#1a7f37">▂▃▂</tspan><tspan fill="#d8dee4">▁▁</tspan><tspan fill="#1a7f37">▂▃▂▂</tspan><tspan fill="#d8dee4">▁▁▁▁</tspan><tspan fill="#1a7f37">▄▄▃▄</tspan><tspan fill="#d8dee4">▁</tspan><tspan fill="#1a7f37">▂▄█▄▄▇▄</tspan><tspan fill="#d8dee4">▁▁</tspan><tspan fill="#1a7f37">▃▇▃</tspan></text>
<text x="16" y="2629" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">active days</tspan></text>
<text x="16" y="2653" xml:space="preserve" fill="#6e7781"><tspan>  </tspan><tspan fill="#1f2328">21 of the last 30</tspan></text>
<text x="16" y="2677" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">latest public push</tspan></text>
<text x="16" y="2701" xml:space="preserve" fill="#6e7781"><tspan>  </tspan><tspan fill="#6e7781">2026-07-23</tspan><tspan>  </tspan><tspan fill="#0969da">xtelos/xtelos</tspan></text>
<text x="16" y="2749" xml:space="preserve" fill="#1f2328"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan>cat stack.txt</tspan></text>
<text x="16" y="2773" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">languages</tspan></text>
<text x="16" y="2797" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  JavaScript · TypeScript · Python · PHP ·</tspan></text>
<text x="16" y="2821" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  SQL</tspan></text>
<text x="16" y="2845" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">frontend</tspan></text>
<text x="16" y="2869" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  React · Next.js · single-page apps that</tspan></text>
<text x="16" y="2893" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  stay fast</tspan></text>
<text x="16" y="2917" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">backend</tspan></text>
<text x="16" y="2941" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  Node.js · Flask · Express · REST and JSON-</tspan></text>
<text x="16" y="2965" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  RPC APIs</tspan></text>
<text x="16" y="2989" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">data</tspan></text>
<text x="16" y="3013" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  PostgreSQL · MySQL · MongoDB · Redis</tspan></text>
<text x="16" y="3037" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">infra</tspan></text>
<text x="16" y="3061" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  AWS · Docker · CI/CD · Linux</tspan></text>
<text x="16" y="3085" xml:space="preserve" fill="#6e7781"><tspan fill="#0969da">ai</tspan></text>
<text x="16" y="3109" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  LLM integration · image generation · speech</tspan></text>
<text x="16" y="3133" xml:space="preserve" fill="#6e7781"><tspan fill="#1f2328">  to text</tspan></text>
<text x="16" y="3181" xml:space="preserve"><tspan fill="#1a7f37">➜ </tspan><tspan fill="#0969da">~ </tspan><tspan class="cursor" fill="#1f2328">▋</tspan></text>
</svg>
